        description: "In production you need real-time regime updates as each new bar arrives. Online forward filtering: update P(s_t | y_1:t) incrementally — no retraining, just a matrix-vector multiply per bar. Combine with online Kalman for real-time channel boundary tracking. BOCPD for instantaneous breakout detection. Full production pipeline: new bar arrives → Kalman updates channel estimate → HMM forward step updates regime posterior → BOCPD checks for breakout → signal emitted.",
        resources: [
          { label: "Paper: Adams & MacKay (2007) — 'Bayesian Online Changepoint Detection'", type: "paper" },
          { label: "Library: filterpy (Kalman + particle filters)", type: "web" },
        ],
        pythonTask: "Implement the full online pipeline: process SPY bars one at a time, updating Kalman channel estimate and HMM regime posterior at each step. Plot how the bull/bear/sideways posterior evolves in real time through the March 2020 crash and recovery. Measure the lag between the channel breakout and posterior exceeding 0.8.",
      },
      {
        title: "Deep Probabilistic & Neural Channel Models",
        tag: "ML",
        difficulty: "Expert",
        yourBackground: "Your noncommutative geometry background gives unusual geometric intuition here",
        description: "Deep Kalman Filters: replace linear Gaussian state-space with neural networks — channel boundaries become learned nonlinear functions of a latent state. Input-Output HMMs: regime transition probabilities depend on external inputs (VIX level, macro variables). Variational autoencoders for unsupervised channel regime discovery. These are research frontier tools — relevant when classical HMMs have saturated their capacity.",
        resources: [
          { label: "Paper: Krishnan, Shalit & Sontag (2017) — 'Structured Inference Networks for Nonlinear State Space Models'", type: "paper" },
          { label: "Library: Pyro (probabilistic deep learning on PyTorch)", type: "web" },
        ],
        pythonTask: "Implement an Input-Output HMM where transition probabilities are a softmax function of VIX level. Hypothesis: high VIX increases probability of transitioning into bear channel. Fit and compare transition matrices at VIX=15 vs VIX=35. Does the IO-HMM produce more persistent regimes?",
      },
    ],
  },
];

const tagColors = {
  "Finance": { bg: "#0c2233", text: "#38bdf8" },
  "Finance + Stats": { bg: "#0c2218", text: "#4ade80" },
  "Maths": { bg: "#1f1a0c", text: "#fbbf24" },
  "Stats + ML": { bg: "#1a0c2a", text: "#c084fc" },
  "Maths + ML": { bg: "#2a0c2a", text: "#e879f9" },
  "Applied Finance": { bg: "#0c2a1a", text: "#34d399" },
  "Programming": { bg: "#0c0c2a", text: "#818cf8" },
  "Engineering": { bg: "#0c1a0c", text: "#86efac" },
  "ML": { bg: "#2a0c1a", text: "#f9a8d4" },
};

const difficultyDot = {
  "Beginner": "#4ade80",
  "Intermediate": "#fb923c",
  "Advanced": "#e879f9",
  "Expert": "#f87171",
};

const resourceIcons = { book: "📚", web: "🌐", course: "🎓", paper: "📄" };

function App() {
  const [expandedPhase, setExpandedPhase] = useState(0);
  const [expandedTopic, setExpandedTopic] = useState(null);
  const [completed, setCompleted] = useState(new Set());

  const toggleDone = (key, e) => {
    e.stopPropagation();
    setCompleted(prev => {
      const n = new Set(prev);
      n.has(key) ? n.delete(key) : n.add(key);
      return n;
    });
  };

  const total = roadmap.reduce((a, p) => a + p.topics.length, 0);
  const pct = Math.round((completed.size / total) * 100);

  return (
    <div style={{ fontFamily: "'EB Garamond', 'Palatino Linotype', Georgia, serif", background: "#07080f", minHeight: "100vh", color: "#d4d4e8" }}>
      <div style={{ background: "#0b0c17", borderBottom: "1px solid #151528", padding: "0.85rem 1.5rem", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "0.75rem", position: "sticky", top: 0, zIndex: 100 }}>
        <div>
          <div style={{ fontSize: "0.62rem", letterSpacing: "0.25em", color: "#38bdf8", fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase" }}>VicTecs · Channel Regime Detection · v3</div>
          <div style={{ fontSize: "1rem", color: "#e0e0f8" }}>Quant Researcher Roadmap</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
          <span style={{ fontSize: "0.75rem", color: "#fbbf24", fontFamily: "'JetBrains Mono', monospace" }}>{pct}% · {completed.size}/{total}</span>
          <div style={{ width: "100px", height: "4px", background: "#1a1a2e", borderRadius: "999px", overflow: "hidden" }}>
            <div style={{ width: `${pct}%`, height: "100%", borderRadius: "999px", background: "linear-gradient(90deg, #38bdf8, #e879f9, #fbbf24)", transition: "width 0.5s ease" }} />
          </div>
        </div>
      </div>

      <div style={{ padding: "2.5rem 1.5rem 1.5rem", maxWidth: "900px", margin: "0 auto", textAlign: "center" }}>
        <h1 style={{ fontSize: "clamp(1.6rem, 3.5vw, 2.6rem)", fontWeight: "normal", color: "#f0f0fc", margin: "0 0 0.6rem", lineHeight: 1.25 }}>From PhD Mathematician to Quant Researcher</h1>
        <p style={{ color: "#4a4a6a", fontSize: "0.9rem", fontStyle: "italic", margin: "0 0 0.3rem" }}>Bull, Bear & Sideways Channel Detection · Hidden Markov Models</p>
        <p style={{ color: "#2a2a42", fontSize: "0.72rem", fontFamily: "'JetBrains Mono', monospace", margin: "0 0 1.5rem" }}>7 phases · {total} topics · {total} Python exercises</p>

        <div style={{ display: "flex", justifyContent: "center", gap: "1.2rem", flexWrap: "wrap", marginBottom: "1.5rem" }}>
          {Object.entries(difficultyDot).map(([label, color]) => (
            <div key={label} style={{ display: "flex", alignItems: "center", gap: "0.35rem", fontSize: "0.7rem", color: "#5a5a7a" }}>
              <div style={{ width: "7px", height: "7px", borderRadius: "50%", background: color }} />
              {label}
            </div>
          ))}
        </div>

        <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: "0.35rem" }}>
          {roadmap.map((p, i) => {
            const done = p.topics.filter((_, ti) => completed.has(`${i}-${ti}`)).length;
            const isActive = expandedPhase === i;
            return (
              <button key={i} onClick={() => { setExpandedPhase(i); setExpandedTopic(null); }}
                style={{ background: isActive ? `${p.accent}1a` : "#0d0e1c", border: `1px solid ${isActive ? p.accent + "80" : "#1a1a30"}`, borderRadius: "8px", padding: "0.35rem 0.8rem", cursor: "pointer", fontSize: "0.68rem", color: isActive ? p.accent : "#3a3a5a", fontFamily: "'JetBrains Mono', monospace", transition: "all 0.2s", display: "flex", alignItems: "center", gap: "0.35rem" }}>
                <span style={{ color: isActive ? p.accent : "#2a2a42" }}>{i + 1}</span>
                <span>{p.title.split(" ").slice(2).join(" ") || p.title.split(" ").slice(0,3).join(" ")}</span>
                {done > 0 && <span style={{ color: "#4ade80" }}>{done}/{p.topics.length}</span>}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ maxWidth: "900px", margin: "0 auto", padding: "0 1.5rem 3rem", display: "flex", flexDirection: "column", gap: "0.55rem" }}>
        {roadmap.map((phase, pi) => {
          const isOpen = expandedPhase === pi;
          const doneCount = phase.topics.filter((_, ti) => completed.has(`${pi}-${ti}`)).length;
          const phasePct = Math.round((doneCount / phase.topics.length) * 100);

          return (
            <div key={pi} style={{ borderRadius: "11px", overflow: "hidden", border: `1px solid ${isOpen ? phase.accent + "40" : "#111122"}`, transition: "border-color 0.3s" }}>
              <div onClick={() => setExpandedPhase(isOpen ? null : pi)} style={{ background: isOpen ? `linear-gradient(135deg, #0e0f1e, ${phase.accent}10)` : "#0c0d18", padding: "0.95rem 1.3rem", cursor: "pointer", display: "flex", alignItems: "center", gap: "0.9rem" }}>
                <div style={{ width: "38px", height: "38px", borderRadius: "9px", flexShrink: 0, border: `1.5px solid ${phase.accent}50`, background: `${phase.accent}10`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1rem", color: phase.accent, fontFamily: "'JetBrains Mono', monospace" }}>
                  {phasePct === 100 ? "✓" : pi + 1}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: "0.62rem", color: phase.accent + "cc", letterSpacing: "0.1em", fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase", marginBottom: "0.2rem" }}>{phase.phase} · {phase.duration}</div>
                  <div style={{ fontSize: "0.98rem", color: "#dcdcf4" }}>{phase.title}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "0.6rem", flexShrink: 0 }}>
                  <div>
                    <div style={{ width: "48px", height: "3px", background: "#161628", borderRadius: "999px", overflow: "hidden" }}>
                      <div style={{ width: `${phasePct}%`, height: "100%", background: phase.accent, borderRadius: "999px", transition: "width 0.4s" }} />
                    </div>
                    <div style={{ fontSize: "0.58rem", color: "#3a3a52", textAlign: "right", marginTop: "0.15rem", fontFamily: "'JetBrains Mono', monospace" }}>{doneCount}/{phase.topics.length}</div>
                  </div>
                  <span style={{ color: "#3a3a52", fontSize: "0.9rem", transform: isOpen ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.3s", display: "inline-block" }}>▾</span>
                </div>
              </div>

              {isOpen && (
                <div style={{ background: "#080910", padding: "0.7rem 1.3rem 1.3rem" }}>
                  <div style={{ borderLeft: `2px solid ${phase.accent}50`, paddingLeft: "0.75rem", margin: "0 0 0.9rem", fontSize: "0.81rem", color: "#4a4a62", fontStyle: "italic" }}>{phase.goal}</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
                    {phase.topics.map((topic, ti) => {
                      const key = `${pi}-${ti}`;
                      const isTopicOpen = expandedTopic === key;
                      const isDone = completed.has(key);
                      const tagStyle = tagColors[topic.tag] || { bg: "#0f0f1e", text: "#6a6a8a" };

                      return (
                        <div key={ti} style={{ borderRadius: "7px", border: `1px solid ${isDone ? "#0f1f0f" : isTopicOpen ? "#1c1c32" : "#0f0f20"}`, overflow: "hidden", opacity: isDone ? 0.5 : 1, transition: "all 0.2s" }}>
                          <div onClick={() => setExpandedTopic(isTopicOpen ? null : key)} style={{ background: isTopicOpen ? "#0c0d1c" : "#0a0b16", padding: "0.6rem 0.85rem", cursor: "pointer", display: "flex", alignItems: "center", gap: "0.55rem" }}>
                            <button onClick={(e) => toggleDone(key, e)} style={{ width: "15px", height: "15px", borderRadius: "50%", flexShrink: 0, border: `1.5px solid ${isDone ? "#4ade60" : "#252540"}`, background: isDone ? "#4ade6015" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: "#4ade80", fontSize: "0.5rem", transition: "all 0.2s" }}>{isDone ? "✓" : ""}</button>
                            <div style={{ width: "6px", height: "6px", borderRadius: "50%", flexShrink: 0, background: difficultyDot[topic.difficulty] }} />
                            <span style={{ fontSize: "0.87rem", flex: 1, color: isDone ? "#2a3a2a" : "#cccce6", textDecoration: isDone ? "line-through" : "none" }}>{topic.title}</span>
                            <div style={{ display: "flex", gap: "0.3rem", alignItems: "center", flexShrink: 0 }}>
                              <span style={{ fontSize: "0.58rem", padding: "0.08rem 0.38rem", borderRadius: "4px", background: tagStyle.bg, color: tagStyle.text, fontFamily: "'JetBrains Mono', monospace", whiteSpace: "nowrap" }}>{topic.tag}</span>
                              <span style={{ color: "#252535", fontSize: "0.75rem", transform: isTopicOpen ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s", display: "inline-block" }}>▾</span>
                            </div>
                          </div>

                          {isTopicOpen && (
                            <div style={{ background: "#06070d", padding: "0.9rem 1rem", borderTop: "1px solid #0f0f1e" }}>
                              <div style={{ display: "flex", gap: "0.4rem", alignItems: "flex-start", background: "#080f08", border: "1px solid #152015", borderRadius: "5px", padding: "0.38rem 0.65rem", fontSize: "0.77rem", color: "#3a6a3a", marginBottom: "0.8rem", lineHeight: 1.5 }}>
                                <span style={{ flexShrink: 0, color: "#2a4a2a" }}>↳</span>
                                <span><strong style={{ color: "#4a7a4a" }}>Your background: </strong>{topic.yourBackground}</span>
                              </div>
                              <p style={{ color: "#8080a0", fontSize: "0.83rem", lineHeight: 1.72, margin: "0 0 0.9rem" }}>{topic.description}</p>
                              <div style={{ marginBottom: "0.9rem" }}>
                                <div style={{ fontSize: "0.6rem", color: "#2a2a42", textTransform: "uppercase", letterSpacing: "0.15em", fontFamily: "'JetBrains Mono', monospace", marginBottom: "0.35rem" }}>Resources</div>
                                {topic.resources.map((r, ri) => (
                                  <div key={ri} style={{ display: "flex", gap: "0.45rem", fontSize: "0.77rem", color: "#4a4a62", padding: "0.15rem 0", alignItems: "flex-start" }}>
                                    <span style={{ flexShrink: 0 }}>{resourceIcons[r.type]}</span>
                                    <span>{r.label}</span>
                                  </div>
                                ))}
                              </div>
                              <div style={{ background: "#08091a", border: `1px solid ${phase.accent}22`, borderRadius: "6px", padding: "0.72rem" }}>
                                <div style={{ fontSize: "0.6rem", color: phase.accent + "aa", textTransform: "uppercase", letterSpacing: "0.15em", fontFamily: "'JetBrains Mono', monospace", marginBottom: "0.3rem" }}>🐍 Python Exercise</div>
                                <p style={{ fontSize: "0.8rem", color: "#6a6a82", margin: 0, lineHeight: 1.65 }}>{topic.pythonTask}</p>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{ textAlign: "center", paddingBottom: "2rem", color: "#181828", fontSize: "0.65rem", fontFamily: "'JetBrains Mono', monospace" }}>
        click phase header · coloured dot = difficulty · ○ to mark complete
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
