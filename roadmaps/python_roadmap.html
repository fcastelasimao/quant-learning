    P: covariance matrix (n, n)
    F: state transition matrix (n, n)

def forward_pass(obs, A, B, pi):

            codeTemplate: `import pytest
import numpy as np
from channel_detector import ChannelDetector

@pytest.fixture
def synthetic_bull_channel():
    t = np.arange(100)
    trend = 100 + 0.1 * t
    noise = np.random.randn(100) * 0.5
    return trend + noise

def test_detector_initialization():
    detector = ChannelDetector(n_states=3, window=60)
    assert detector.n_states == 3
    assert detector.model is None

def test_detector_fit(synthetic_bull_channel):
    detector = ChannelDetector(n_states=3)
    detector.fit(synthetic_bull_channel)
    assert detector.model is not None

@pytest.mark.parametrize("n_states", [2, 3, 4, 5])
def test_different_states(n_states, synthetic_bull_channel):
    detector = ChannelDetector(n_states=n_states)
    detector.fit(synthetic_bull_channel)
    probs = detector.predict_proba()
    assert probs.shape == (len(synthetic_bull_channel), n_states)
    assert np.allclose(probs.sum(axis=1), 1.0)

def test_handles_nans():
    prices = np.array([100, 101, np.nan, 103, 104])
    with pytest.raises(ValueError, match="contains NaN"):
        ChannelDetector().fit(prices)

# Run: pytest tests/ -v --cov=channel_detector`,
            ankiCards: [
              "Q: Test function name? | A: def test_function_name():",
              "Q: Assert equal? | A: assert a == b or np.allclose(a, b)",
              "Q: Test raises error? | A: with pytest.raises(ErrorType):",
              "Q: Run tests? | A: pytest or pytest tests/ -v"
            ]
          },
          {
            title: "Git Workflow",
            concepts: ["Atomic commits", "Commit messages", "Branching", "Pull requests", "GitHub portfolio"],
            practice: ["Commit working code daily", "Write descriptive commit messages", "Use feature branches for experiments", "Create clean Git history"],
            checkYourself: "Can someone understand your project history?",
            codeTemplate: `# Daily workflow
git status                          # What changed?
git add channel_detector/models.py  # Stage specific file
git commit -m "Add Viterbi decoding to HMM class

- Implement Viterbi algorithm for most likely state sequence
- Add unit tests for synthetic data
- Benchmark against hmmlearn (matches within 1e-6)"

git push origin main

# Feature branch for experiments
git checkout -b experiment/bocpd-integration
# Make changes, commit
git checkout main
git merge experiment/bocpd-integration`,
            ankiCards: [
              "Q: Stage file? | A: git add filename",
              "Q: Commit? | A: git commit -m 'message'",
              "Q: Create branch? | A: git checkout -b branch-name",
              "Q: Good commit message? | A: Imperative mood, 50 char summary"
            ]
          }
        ],
        milestone: {
          task: "Production-Ready Codebase",
          description: "Full channel-regime-detection package on GitHub",
          codeChallenge: `channel-regime-detection/
├── README.md
├── requirements.txt
├── setup.py
├── .gitignore
├── channel_detector/
│   ├── __init__.py
│   ├── features.py
│   ├── models.py
│   ├── visualization.py
│   └── utils.py
├── tests/
│   ├── test_features.py    # 10+ tests
│   ├── test_models.py      # 15+ tests
│   └── test_utils.py       # 5+ tests
├── notebooks/
│   ├── 01_data_exploration.ipynb
│   ├── 02_feature_engineering.ipynb
│   ├── 03_hmm_baseline.ipynb
│   └── 04_full_pipeline.ipynb
└── examples/
    └── quickstart.py`,
          successCriteria: [
            "README with badges (tests passing, coverage)",
            "80%+ test coverage",
            "Type hints on all public functions",
            "Passes mypy type checking",
            "Clean Git history (atomic commits)",
            "Example notebooks run without errors"
          ]
        },
        resources: [
          { type: "🌐", name: "Real Python - Testing Guide — realpython.com" },
          { type: "📚", name: "Git Pro Book (Free) — git-scm.com" },
          { type: "🎥", name: "Corey Schafer - Git Tutorial (YouTube)" }
        ]
      }
    ]
  }
];

const knowledgeSystem = {
  layers: [
    { name: "Layer 1: Digital Notes", tool: "Obsidian / Notion", purpose: "Quick reference, searchable, linked", updateFrequency: "Daily" },
    { name: "Layer 2: Code Repository", tool: "GitHub", purpose: "Reusable patterns, portfolio, version control", updateFrequency: "Every session" },
    { name: "Layer 3: Physical Notebook", tool: "Paper / iPad", purpose: "Math, debugging, sketching, thinking", updateFrequency: "While coding" },
    { name: "Layer 4: Spaced Repetition", tool: "Anki", purpose: "Long-term retention, interview prep", updateFrequency: "Daily review" },
  ],
  daily: ["Morning: 15min Anki review", "Coding: Physical notes for math/debugging", "Evening: Transfer insights to digital notes", "Commit working code to GitHub"]
};

function App() {
  const [selectedMonth, setSelectedMonth] = useState(0);
  const [expandedWeek, setExpandedWeek] = useState(null);
  const [expandedTopic, setExpandedTopic] = useState(null);
  const [completedItems, setCompletedItems] = useState(new Set());
  const [showKnowledge, setShowKnowledge] = useState(false);

  const toggleComplete = (id) => {
    setCompletedItems(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const totalItems = pythonRoadmap.reduce((acc, month) =>
    acc + month.weeks.reduce((a, w) => a + w.topics.length, 0), 0
  );
  const progress = Math.round((completedItems.size / totalItems) * 100);

  const month = pythonRoadmap[selectedMonth];

  return (
    <div style={{ fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif", background: "linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%)", minHeight: "100vh", color: "#e0e0e0", padding: "2rem 1rem" }}>
      <div style={{ maxWidth: "1100px", margin: "0 auto" }}>

        {/* Header */}
        <div style={{ background: "linear-gradient(135deg, #1e293b 0%, #334155 100%)", borderRadius: "16px", padding: "2rem", marginBottom: "2rem", border: "1px solid #475569" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "1rem", marginBottom: "1rem" }}>
            <div style={{ width: "48px", height: "48px", background: "linear-gradient(135deg, #3b82f6, #8b5cf6)", borderRadius: "12px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.5rem" }}>🐍</div>
            <div>
              <h1 style={{ margin: 0, fontSize: "2rem", color: "#f1f5f9" }}>Python for Quant Finance</h1>
              <p style={{ margin: "0.25rem 0 0", color: "#94a3b8", fontSize: "0.95rem" }}>Integrated 12-week learning plan</p>
            </div>
          </div>
          <div style={{ background: "#1e293b", borderRadius: "12px", padding: "1rem", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "1rem" }}>
            <div><div style={{ fontSize: "0.85rem", color: "#94a3b8", marginBottom: "0.25rem" }}>Progress</div><div style={{ fontSize: "1.75rem", fontWeight: "600", color: "#3b82f6" }}>{progress}%</div></div>
            <div><div style={{ fontSize: "0.85rem", color: "#94a3b8", marginBottom: "0.25rem" }}>Completed</div><div style={{ fontSize: "1.75rem", fontWeight: "600", color: "#10b981" }}>{completedItems.size}/{totalItems}</div></div>
            <div style={{ flex: 1, minWidth: "200px" }}>
              <div style={{ height: "8px", background: "#334155", borderRadius: "999px", overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${progress}%`, background: "linear-gradient(90deg, #3b82f6, #8b5cf6, #f59e0b)", transition: "width 0.3s ease" }} />
              </div>
            </div>
          </div>
          <button onClick={() => setShowKnowledge(!showKnowledge)} style={{ marginTop: "1rem", background: showKnowledge ? "#8b5cf6" : "#475569", color: "white", border: "none", borderRadius: "8px", padding: "0.75rem 1.25rem", fontSize: "0.9rem", cursor: "pointer", fontWeight: "500" }}>
            {showKnowledge ? "Hide" : "Show"} Knowledge Organization System
          </button>
        </div>

        {/* Knowledge System */}
        {showKnowledge && (
          <div style={{ background: "#1e293b", borderRadius: "16px", padding: "2rem", marginBottom: "2rem", border: "1px solid #475569" }}>
            <h2 style={{ margin: "0 0 1.5rem", color: "#f1f5f9", fontSize: "1.5rem" }}>📚 4-Layer Knowledge Organization</h2>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: "1rem", marginBottom: "1.5rem" }}>
              {knowledgeSystem.layers.map((layer, i) => (
                <div key={i} style={{ background: "#0f172a", borderRadius: "12px", padding: "1.25rem", border: "1px solid #334155" }}>
                  <h3 style={{ margin: "0 0 0.5rem", color: "#3b82f6", fontSize: "0.95rem" }}>{layer.name}</h3>
                  <div style={{ fontSize: "0.85rem", color: "#94a3b8", marginBottom: "0.5rem" }}><strong>Tool:</strong> {layer.tool}</div>
                  <div style={{ fontSize: "0.8rem", color: "#cbd5e1", marginBottom: "0.5rem" }}>{layer.purpose}</div>
                  <div style={{ fontSize: "0.75rem", color: "#64748b" }}>Update: {layer.updateFrequency}</div>
                </div>
              ))}
            </div>
            <div style={{ background: "#0f172a", borderRadius: "12px", padding: "1.25rem", border: "1px solid #334155" }}>
              <h3 style={{ margin: "0 0 0.75rem", color: "#f1f5f9", fontSize: "1rem" }}>Daily Workflow</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: "0.5rem" }}>
                {knowledgeSystem.daily.map((step, i) => (
                  <div key={i} style={{ fontSize: "0.85rem", color: "#cbd5e1", padding: "0.5rem", background: "#1e293b", borderRadius: "6px", borderLeft: "3px solid #3b82f6" }}>{step}</div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Month Selector */}
        <div style={{ display: "flex", gap: "0.75rem", marginBottom: "2rem", flexWrap: "wrap" }}>
          {pythonRoadmap.map((m, i) => (
            <button key={i} onClick={() => { setSelectedMonth(i); setExpandedWeek(null); setExpandedTopic(null); }}
              style={{ background: selectedMonth === i ? `linear-gradient(135deg, ${m.color}, ${m.color}cc)` : "#334155", color: "white", border: "none", borderRadius: "12px", padding: "1rem 1.5rem", cursor: "pointer", fontSize: "0.95rem", fontWeight: "500", transition: "all 0.2s", flex: "1", minWidth: "150px" }}>
              <div style={{ fontSize: "0.75rem", opacity: 0.9, marginBottom: "0.25rem" }}>{m.month}</div>
              <div>{m.title}</div>
            </button>
          ))}
        </div>

        {/* Month Header */}
        <div style={{ background: `linear-gradient(135deg, ${month.color}20, ${month.color}10)`, borderRadius: "12px", padding: "1.5rem", marginBottom: "2rem", border: `1px solid ${month.color}40` }}>
          <div style={{ fontSize: "0.85rem", color: month.color, marginBottom: "0.5rem", fontWeight: "500" }}>{month.period} · {month.integrationNote}</div>
          <h2 style={{ margin: 0, color: "#f1f5f9", fontSize: "1.75rem" }}>{month.title}</h2>
        </div>

        {/* Weeks */}
        <div style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>
          {month.weeks.map((week, weekIdx) => {
            const weekId = `${selectedMonth}-${weekIdx}`;
            const isExpanded = expandedWeek === weekId;
            const weekCompleted = week.topics.every((_, ti) => completedItems.has(`${weekId}-${ti}`));

            return (
              <div key={weekIdx} style={{ background: "#1e293b", borderRadius: "12px", border: `1px solid ${weekCompleted ? "#10b981" : "#475569"}`, overflow: "hidden" }}>
                <div onClick={() => setExpandedWeek(isExpanded ? null : weekId)}
                  style={{ padding: "1.5rem", cursor: "pointer", display: "flex", alignItems: "center", gap: "1rem", background: isExpanded ? "#334155" : "transparent" }}>
                  <div style={{ width: "40px", height: "40px", borderRadius: "10px", background: weekCompleted ? "#10b981" : month.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.1rem", flexShrink: 0, color: "white", fontWeight: "600" }}>
                    {weekCompleted ? "✓" : weekIdx + 1}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: "0.8rem", color: "#94a3b8", marginBottom: "0.25rem" }}>{week.week} · {week.difficulty} · {week.timeCommitment}</div>
                    <div style={{ fontSize: "1.2rem", color: "#f1f5f9", fontWeight: "500", marginBottom: "0.25rem" }}>{week.title}</div>
                    <div style={{ fontSize: "0.85rem", color: "#cbd5e1" }}>Goal: {week.goal}</div>
                    <div style={{ fontSize: "0.75rem", color: month.color, marginTop: "0.5rem", padding: "0.4rem 0.75rem", background: `${month.color}15`, borderRadius: "6px", borderLeft: `3px solid ${month.color}`, display: "inline-block" }}>
                      🎯 {week.quantTrigger}
                    </div>
                  </div>
                  <span style={{ color: "#94a3b8", fontSize: "1.2rem", transform: isExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▼</span>
                </div>

                {isExpanded && (
                  <div style={{ padding: "0 1.5rem 1.5rem" }}>
                    {week.topics.map((topic, topicIdx) => {
                      const topicId = `${weekId}-${topicIdx}`;
                      const isTopicExpanded = expandedTopic === topicId;
                      const isCompleted = completedItems.has(topicId);

                      return (
                        <div key={topicIdx} style={{ background: "#0f172a", borderRadius: "8px", marginBottom: "0.75rem", border: `1px solid ${isCompleted ? "#10b98150" : "#334155"}`, overflow: "hidden" }}>
                          <div onClick={() => setExpandedTopic(isTopicExpanded ? null : topicId)}
                            style={{ padding: "1rem", cursor: "pointer", display: "flex", alignItems: "center", gap: "0.75rem" }}>
                            <button onClick={(e) => { e.stopPropagation(); toggleComplete(topicId); }}
                              style={{ width: "24px", height: "24px", borderRadius: "6px", background: isCompleted ? "#10b981" : "transparent", border: `2px solid ${isCompleted ? "#10b981" : "#475569"}`, color: "white", cursor: "pointer", fontSize: "0.85rem", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                              {isCompleted ? "✓" : ""}
                            </button>
                            <div style={{ flex: 1, fontSize: "1rem", color: isCompleted ? "#94a3b8" : "#f1f5f9", fontWeight: "500", textDecoration: isCompleted ? "line-through" : "none" }}>{topic.title}</div>
                            <span style={{ color: "#64748b", transform: isTopicExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▼</span>
                          </div>

                          {isTopicExpanded && (
                            <div style={{ padding: "0 1rem 1rem" }}>
                              <div style={{ fontSize: "0.85rem", color: "#cbd5e1", marginBottom: "1rem" }}>
                                <strong>Concepts:</strong>
                                <ul style={{ margin: "0.5rem 0", paddingLeft: "1.5rem", lineHeight: "1.8" }}>
                                  {topic.concepts.map((c, i) => <li key={i}>{c}</li>)}
                                </ul>
                              </div>
                              <div style={{ fontSize: "0.85rem", color: "#cbd5e1", marginBottom: "1rem" }}>
                                <strong>Practice:</strong>
                                <ul style={{ margin: "0.5rem 0", paddingLeft: "1.5rem", lineHeight: "1.8" }}>
                                  {topic.practice.map((p, i) => <li key={i}>{p}</li>)}
                                </ul>
                              </div>
                              {topic.commonPitfalls && (
                                <div style={{ fontSize: "0.85rem", color: "#fca5a5", marginBottom: "1rem", background: "#450a0a20", borderRadius: "6px", padding: "0.75rem", borderLeft: "3px solid #f87171" }}>
                                  <strong>⚠️ Common Pitfalls:</strong>
                                  <ul style={{ margin: "0.5rem 0", paddingLeft: "1.5rem", lineHeight: "1.8" }}>
                                    {topic.commonPitfalls.map((p, i) => <li key={i}>{p}</li>)}
                                  </ul>
                                </div>
                              )}
                              <div style={{ background: "#1e293b", borderRadius: "6px", padding: "0.75rem", fontSize: "0.85rem", color: "#fbbf24", borderLeft: "3px solid #fbbf24", marginBottom: "1rem" }}>
                                <strong>✓ Check yourself:</strong> {topic.checkYourself}
                              </div>
                              {topic.codeTemplate && (
                                <div style={{ marginBottom: "1rem" }}>
                                  <div style={{ fontSize: "0.7rem", color: "#94a3b8", marginBottom: "0.5rem", fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.1em" }}>CODE TEMPLATE:</div>
                                  <pre style={{ background: "#020617", border: "1px solid #1e293b", borderRadius: "8px", padding: "1rem", fontSize: "0.78rem", color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace", lineHeight: "1.6", overflow: "auto" }}>{topic.codeTemplate}</pre>
                                </div>
                              )}
                              {topic.ankiCards && (
                                <div>
                                  <div style={{ fontSize: "0.7rem", color: "#94a3b8", marginBottom: "0.5rem", fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.1em" }}>ANKI CARDS TO CREATE:</div>
                                  <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
                                    {topic.ankiCards.map((card, i) => (
                                      <div key={i} style={{ background: "#8b5cf620", border: "1px solid #8b5cf650", borderRadius: "6px", padding: "0.6rem 0.75rem", fontSize: "0.78rem", color: "#cbd5e1", fontFamily: "'JetBrains Mono', monospace" }}>{card}</div>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}

                    {/* Milestone */}
                    {week.milestone && (
                      <div style={{ background: `linear-gradient(135deg, ${month.color}20, ${month.color}10)`, border: `2px solid ${month.color}`, borderRadius: "12px", padding: "1.5rem", marginTop: "1rem" }}>
                        <div style={{ fontSize: "0.9rem", color: month.color, fontWeight: "600", marginBottom: "0.5rem" }}>🎯 WEEK MILESTONE: {week.milestone.task}</div>
                        <div style={{ fontSize: "0.9rem", color: "#cbd5e1", marginBottom: "1rem", lineHeight: "1.6" }}>{week.milestone.description}</div>
                        {week.milestone.codeChallenge && (
                          <pre style={{ background: "#0f172a", border: "1px solid #334155", borderRadius: "8px", padding: "1rem", fontSize: "0.78rem", color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace", lineHeight: "1.6", marginBottom: "1rem", overflow: "auto" }}>{week.milestone.codeChallenge}</pre>
                        )}
                        <div style={{ fontSize: "0.85rem", color: "#94a3b8" }}>
                          <strong>Success criteria:</strong>
                          <ul style={{ margin: "0.5rem 0", paddingLeft: "1.5rem", lineHeight: "1.8" }}>
                            {week.milestone.successCriteria.map((c, i) => <li key={i}>{c}</li>)}
                          </ul>
                        </div>
                      </div>
                    )}

                    {/* Resources */}
                    <div style={{ marginTop: "1rem", padding: "1rem", background: "#0f172a", borderRadius: "8px", border: "1px solid #334155" }}>
                      <div style={{ fontSize: "0.85rem", color: "#94a3b8", marginBottom: "0.75rem", fontWeight: "600" }}>📚 Resources</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
                        {week.resources.map((res, i) => (
                          <div key={i} style={{ fontSize: "0.85rem", color: "#cbd5e1", display: "flex", alignItems: "center", gap: "0.5rem" }}>
                            <span>{res.type}</span><span>{res.name}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
